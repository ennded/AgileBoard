services:
  mongo:
    image: mongo
    container_name: mongodb
    ports:
      - "27017:27017"
  
  backend:
    build: ./backend
    container_name: graphql-backend
    ports:
      - "5003:5003"
    depends_on:
      - mongo
    environment:
      - MONGO_URI=mongodb://mongo:27017/taskdb
      - PORT=5001
    volumes:
      - ./backend:/app
      - /app/node_modules
  
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

      
volumes:
  mongo-data:
  

  
