name: PR Title Check

on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize
      - reopened

jobs:
  validate-title:
    runs-on: ubuntu-latest

    steps:
      - name: Validate pull request title
        uses: amannn/action-semantic-pull-request@5369185dc9812f174fa58b03b13b79920b68f8e1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            docs
            refactor
            test
            build
            ci
          requireScope: false
